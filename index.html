<!doctype html>

<html lang="pt-br">
    <head>
        <meta charset="utf-8" />
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0" 
        />
        <title>Cadastrar - Drip Store</title>
        <link 
            rel="stylesheet" 
            href="./style.css" 
        />
    </head>
    <body>
       <header>
        <a href="#">
            <img 
                src="./assets/logo.svg" 
                alt="Logo da loja" 
            />
            <span>Drip Store</span>
        </a>
       </header> 
       <main>
            <form>
                <div class="title">
                    <h1>Acesse sua Conta</h1>
                    <p>Novo Cliente? Então registre-se <a href="#">aqui</a>.</p>
                </div> 
                <div class="inputs">
                    <div>
                        <label>Email *</label>
                        <input 
                            type="email" 
                            placeholder="Insira seu Email" 
                        />
                    </div>
                    <div>
                        <label>Senha *</label>
                        <input 
                            type="password" 
                            placeholder="Insira sua Senha"
                        />
                    </div>
                </div>
                <p><a href="#">Esqueci minha senha</a></p>
                <button>Acessar Conta</button>
                <div class="others">
                    <p>Ou faça login com</p>
                    <ul>
                        <li>
                            <a href="#">
                                <img 
                                    src="./assets/email.svg" 
                                    alt="ícone para acesso com email" 
                                />
                            </a>
                        </li>
                        <li>
                            <a href="#">
                                <img 
                                    src="./assets/facebook.svg" 
                                    alt="ícone para acesso com facebook" 
                                />
                            </a>
                        </li>
                    </ul>
                </div>
            </form>
       </main>
    </body>
</html>
